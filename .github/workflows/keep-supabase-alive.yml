name: Keep Supabase Alive

on:
  schedule:
    # Runs every 3 days at 10:00 UTC — well within the 7-day pause window
    - cron: '0 10 */3 * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.ASUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.ASUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "Warning: Unexpected status code $STATUS"
            exit 1
          fi
          echo "Supabase is alive."
