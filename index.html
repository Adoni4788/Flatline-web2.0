<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flatline Security Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              archivo: ['Archivo', 'sans-serif'],
            },
            fontSize: {
              'h1': ['40px', { lineHeight: '44px', fontWeight: '500' }],
              'h2': ['32px', { lineHeight: '36px', fontWeight: '500' }],
              'h3': ['28px', { lineHeight: '32px', fontWeight: '500' }],
              'h4': ['24px', { lineHeight: '28px', fontWeight: '500' }],
              'h5': ['20px', { lineHeight: '24px', fontWeight: '500' }],
              'h6': ['18px', { lineHeight: '22px', fontWeight: '500' }],
              'subtitle1': ['16px', { lineHeight: '20px', fontWeight: '500' }],
              'subtitle2': ['14px', { lineHeight: '18px', fontWeight: '500' }],
              'body1': ['16px', { lineHeight: '20px', fontWeight: '400' }],
              'body2': ['14px', { lineHeight: '18px', fontWeight: '400' }],
              'caption': ['12px', { lineHeight: '16px', fontWeight: '400' }],
              'caption1': ['12px', { lineHeight: '16px', fontWeight: '500' }],
            },
            colors: {
              border: "hsl(var(--border))",
              background: "#030712", // gray-950/black mix
              foreground: "#f8fafc",
              primary: {
                DEFAULT: "#ef4444", // red-500
                foreground: "#ffffff",
              },
              muted: {
                DEFAULT: "#1f2937",
                foreground: "#9ca3af",
              },
              card: {
                DEFAULT: "rgba(17, 24, 39, 0.7)",
                foreground: "#f8fafc",
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'pulse-slow': 'pulseSlow 8s ease-in-out infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              pulseSlow: {
                '0%, 100%': { opacity: '0' },
                '50%': { opacity: '0.12' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --border: 217.2 32.6% 17.5%;
      }
      body {
        background-color: #030712;
        color: #f8fafc;
      }
      .glass-card {
        background: linear-gradient(135deg, rgba(26, 31, 44, 0.7), rgba(34, 31, 38, 0.7));
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
      }
      .bg-grid-pattern {
        background-image:
          linear-gradient(to right, rgb(243 244 246 / 0.05) 1px, transparent 1px),
          linear-gradient(to bottom, rgb(243 244 246 / 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #111827; 
      }
      ::-webkit-scrollbar-thumb {
        background: #374151; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #ef4444; 
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
