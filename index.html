<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flatline Security Training</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      // Capture Supabase auth redirect flags before the SDK loads and clears the URL.
      // Implicit flow puts tokens in the hash (#type=recovery); PKCE flow puts a code
      // in the query string (?code=xxx). Either way we want to land on /reset-password.
      (function () {
        var hash = window.location.hash || '';
        var search = window.location.search || '';
        // Save snapshot for debugging — we can't easily inspect the URL after
        // the SDK and HashRouter both rewrite it.
        try {
          window.localStorage.setItem('__authLandingUrl', JSON.stringify({
            href: window.location.href,
            hash: hash,
            search: search,
            ts: new Date().toISOString()
          }));
        } catch (e) { /* ignore */ }
        if (
          hash.indexOf('type=recovery') !== -1 ||
          hash.indexOf('type=signup') !== -1 ||
          hash.indexOf('type=invite') !== -1 ||
          search.indexOf('code=') !== -1
        ) {
          window.__pendingAuthRedirect = '/reset-password';
        } else if (hash.indexOf('error=') !== -1 || hash.indexOf('error_code=') !== -1) {
          // Capture the error so the app can show a useful message
          window.__pendingAuthError = hash;
          window.__pendingAuthRedirect = '/auth-error';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
